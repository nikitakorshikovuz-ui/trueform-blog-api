 - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install requests beautifulsoup4

  - name: Run parser
    run: python telegram_parser.py

  - name: Commit and Push
    run: |
      git config --local user.name "github-actions[bot]"
      git config --local user.email "github-actions[bot]@users.noreply.github.com"
      git add telegram_blog_data.json
      # Проверяем есть ли папка, чтобы не было ошибки
      if [ -d "images" ]; then git add images/; fi
      git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: скачаны новые посты и картинки"
      git push
