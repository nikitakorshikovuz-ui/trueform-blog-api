name: Trueform Telegram Parseron:schedule:# Запускается автоматически 2 раза в день- cron: '0 3,15 * * *'workflow_dispatch: # Позволяет запускать вручную по кнопкеpermissions:contents: writejobs:parse-and-deploy:runs-on: ubuntu-lateststeps:- name: Checkout repositoryuses: actions/checkout@v4  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install requests beautifulsoup4

  - name: Run parser
    run: python telegram_parser.py

  - name: Commit and Push
    run: |
      git config --local user.name "github-actions[bot]"
      git config --local user.email "github-actions[bot]@users.noreply.github.com"
      # Добавляем файл с текстом и папку с картинками
      git add telegram_blog_data.json
      git add images/ || true
      # Сохраняем изменения, только если они есть
      git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: скачаны новые посты и картинки"
      git push
