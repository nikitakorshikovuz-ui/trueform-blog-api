name: Telegram Blog Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3,15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run parser script
        run: python telegram_parser.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Безопасное добавление файлов
          git add telegram_blog_data.json || true
          git add images/ || true
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: новые посты и картинки"
          git push
```
